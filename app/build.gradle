 * This generated file contains a sample Java application project to get you started.
 * For more details on building Java & JVM projects, please refer to https://docs.gradle.org/8.14/userguide/building_java_projects.html in the Gradle documentation.
 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.assertj:assertj-core:3.17.2'
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.assertj:assertj-swing-junit:3.17.1' // For Swing GUI testing

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava

    // SQLite JDBC driver
    implementation 'org.xerial:sqlite-jdbc:3.43.0.0'
    // Your existing dependencies
    
    // Add JUnit 4 vintage engine to run JUnit 4 tests through JUnit 5 platform
    testImplementation 'org.junit.vintage:junit-vintage-engine'
}

test {
    // This ensures GUI tests can run
    systemProperty 'java.awt.headless', 'false'

    // Optional: View test progress
    testLogging {
        events "passed", "skipped", "failed"
    }

    // Keep useJUnitPlatform()
    useJUnitPlatform()
}

// Add JVM arguments to allow reflection access
tasks.withType(Test).configureEach {
    jvmArgs += ['--add-opens', 'java.base/java.util=ALL-UNNAMED']
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'beatbinder.App'
}

jar {
    manifest {
        attributes(
                'Main-Class': 'beatbinder.App'
        )
    }
}